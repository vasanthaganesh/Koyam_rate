name: koyam_rate
description: "KoyamRate – Daily Koyambedu vegetable wholesale prices for Chennai shoppers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.8.4
  google_mobile_ads: ^5.3.0
  shared_preferences: ^2.5.4
  flutter_svg: ^2.0.17
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_riverpod: ^3.3.1
  flutter_local_notifications: ^21.0.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  timezone: ^0.11.0
  workmanager: ^0.9.0+3
  fl_chart: ^0.70.2
  in_app_review: ^2.0.10
  share_plus: ^10.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FF9800"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    # Images migrated to Supabase Storage bucket "vegetable-images"
    - assets/icon.png
    - assets/images/onboarding/
