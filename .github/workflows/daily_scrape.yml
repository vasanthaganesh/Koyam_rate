name: Daily Price Scrape

on:
  schedule:
    - cron: '30 2 * * *' # Runs at 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  scrape:
    runs-on: self-hosted
    # No defaults shell — use pwsh explicitly on steps that need scripting;
    # npm/node steps use the runner default (cmd) where PATH is already set.
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scraper
            .env
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd scraper
          npm install

      - name: Run Scraper
        id: scrape  # id required so later steps can read outputs.rows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: powershell  # PowerShell — node/npm are in PATH here on Windows runner
        run: |
          # Capture scraper output and parse inserted row count
          $OUTPUT = node scraper/scrape_and_upsert.mjs 2>&1
          Write-Output $OUTPUT
          $match = $OUTPUT | Select-String -Pattern 'Inserted New:\s+(\d+)'
          $ROWS = if ($match) { $match.Matches[0].Groups[1].Value } else { '0' }
          echo "rows=$ROWS" >> $env:GITHUB_OUTPUT

      # ── Success alert ──────────────────────────────────────────────────────────
      - name: Telegram — Scraper OK
        if: success()  # fires only when all previous steps passed
        shell: powershell    # use PowerShell so Invoke-RestMethod is available
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROWS: ${{ steps.scrape.outputs.rows }}
        run: |
          $DATE = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          $RUN_URL = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $TEXT = "✅ KoyamRate scraper OK`nDate: $DATE`nRows inserted: $env:ROWS`nRun: $RUN_URL"
          $bodyString = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $TEXT } | ConvertTo-Json
          $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($bodyString)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" `
            -Method Post -ContentType 'application/json; charset=utf-8' -Body $bodyBytes

      # ── Failure alert ──────────────────────────────────────────────────────────
      - name: Telegram — Scraper FAILED
        if: failure()  # fires only when a previous step in this job has failed
        shell: powershell    # use PowerShell so Invoke-RestMethod is available
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $DATE = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          $RUN_URL = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $TEXT = "❌ KoyamRate scraper FAILED`nRun date: $DATE`nRun ID: ${{ github.run_id }}`nView run: $RUN_URL`n`n⚠️ Check if the portal token endpoint changed."
          $bodyString = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $TEXT } | ConvertTo-Json
          $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($bodyString)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" `
            -Method Post -ContentType 'application/json; charset=utf-8' -Body $bodyBytes
