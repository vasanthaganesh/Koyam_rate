name: Daily Price Scrape

on:
  schedule:
    - cron: '30 2 * * *' # Runs at 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scraper
            .env
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          cd scraper
          npm install
          
      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # We don't need the actual .env file on GitHub because we're passing secrets directly
        run: |
          node scraper/scrape_and_upsert.mjs
